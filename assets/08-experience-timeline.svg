<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="390" viewBox="0 0 1100 390" role="img" aria-label="Animated experience timeline">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="45%" stop-color="#071327"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.28"/>
      <stop offset="45%" stop-color="#8b5cf6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .title{font:800 30px Segoe UI,Arial,sans-serif;fill:#f8fafc;letter-spacing:-.4px}
      .h{font:700 18px Segoe UI,Arial,sans-serif;fill:#e5e7eb}
      .sub{font:500 13px Segoe UI,Arial,sans-serif;fill:#94a3b8}
      .small{font:600 12px Segoe UI,Arial,sans-serif;fill:#cbd5e1}
      .tiny{font:600 11px JetBrains Mono,Consolas,monospace;fill:#93c5fd}
      .mono{font:600 15px JetBrains Mono,Consolas,monospace;fill:#e5e7eb}
      .tag{font:700 12px Segoe UI,Arial,sans-serif;fill:#dbeafe;letter-spacing:.5px}
    </style>
  </defs>
  
  <rect width="1100" height="390" rx="26" fill="url(#bg)"/>
  <text x="50" y="55" class="title">Experience Timeline</text>
  <text x="50" y="82" class="sub">Security, AI, Rust systems, blockchain, and production engineering journey</text>
  <line x1="90" y1="210" x2="1010" y2="210" stroke="#1e3a5f" stroke-width="5" stroke-linecap="round"/>
  <line x1="90" y1="210" x2="1010" y2="210" stroke="url(#cyan)" stroke-width="5" stroke-linecap="round" stroke-dasharray="80 18">
    <animate attributeName="stroke-dashoffset" from="0" to="-196" dur="6s" repeatCount="indefinite"/>
  </line>
  <g>
    <circle cx="130" cy="210" r="14" fill="#22d3ee" filter="url(#glow)"/><text x="90" y="260" class="h">DKS</text><text x="72" y="282" class="sub">Full-stack + Solidity</text><text x="78" y="302" class="tiny">2023-2025</text>
    <circle cx="305" cy="210" r="14" fill="#8b5cf6" filter="url(#glow)"/><text x="260" y="150" class="h">Monad</text><text x="230" y="172" class="sub">Security testing</text><text x="250" y="192" class="tiny">2024</text>
    <circle cx="480" cy="210" r="14" fill="#fb923c" filter="url(#glow)"/><text x="432" y="260" class="h">Sentient</text><text x="405" y="282" class="sub">LLM evaluation</text><text x="420" y="302" class="tiny">2024-2025</text>
    <circle cx="655" cy="210" r="14" fill="#34d399" filter="url(#glow)"/><text x="610" y="150" class="h">CyberZeus</text><text x="586" y="172" class="sub">Rust systems</text><text x="600" y="192" class="tiny">2025</text>
    <circle cx="830" cy="210" r="14" fill="#22d3ee" filter="url(#glow)"/><text x="790" y="260" class="h">AI / Data</text><text x="762" y="282" class="sub">Testing & feedback</text><text x="780" y="302" class="tiny">2025</text>
    <circle cx="1000" cy="210" r="14" fill="#f59e0b" filter="url(#glow)"/><text x="940" y="150" class="h">Team Lead</text><text x="912" y="172" class="sub">Delivery ownership</text><text x="944" y="192" class="tiny">Current</text>
  </g>
  <circle r="6" fill="#ffffff">
    <animateMotion dur="6s" repeatCount="indefinite" path="M90 210 L1010 210"/>
  </circle>

</svg>