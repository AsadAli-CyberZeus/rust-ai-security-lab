<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="440" viewBox="0 0 1100 440" role="img" aria-label="Animated role alignment bars">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="45%" stop-color="#071327"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.28"/>
      <stop offset="45%" stop-color="#8b5cf6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .title{font:800 30px Segoe UI,Arial,sans-serif;fill:#f8fafc;letter-spacing:-.4px}
      .h{font:700 18px Segoe UI,Arial,sans-serif;fill:#e5e7eb}
      .sub{font:500 13px Segoe UI,Arial,sans-serif;fill:#94a3b8}
      .small{font:600 12px Segoe UI,Arial,sans-serif;fill:#cbd5e1}
      .tiny{font:600 11px JetBrains Mono,Consolas,monospace;fill:#93c5fd}
      .mono{font:600 15px JetBrains Mono,Consolas,monospace;fill:#e5e7eb}
      .tag{font:700 12px Segoe UI,Arial,sans-serif;fill:#dbeafe;letter-spacing:.5px}
    </style>
  </defs>
  
  <rect width="1100" height="440" rx="26" fill="url(#bg)"/>
  <text x="50" y="58" class="title">Role Alignment</text>
  <text x="50" y="86" class="sub">Where the profile is strongest across current target roles</text>
  <g transform="translate(70,125)">
    <text x="0" y="18" class="h">Security Software Engineer</text>
    <rect x="310" y="0" width="650" height="20" rx="10" fill="#1f2937"/><rect x="310" y="0" width="610" height="20" rx="10" fill="url(#cyan)"><animate attributeName="width" values="0;610;610" dur="2s" repeatCount="indefinite"/></rect>
    <text x="0" y="72" class="h">AI Systems Engineer</text>
    <rect x="310" y="54" width="650" height="20" rx="10" fill="#1f2937"/><rect x="310" y="54" width="570" height="20" rx="10" fill="url(#purple)"><animate attributeName="width" values="0;570;570" dur="2.2s" repeatCount="indefinite"/></rect>
    <text x="0" y="126" class="h">Rust Systems Engineer</text>
    <rect x="310" y="108" width="650" height="20" rx="10" fill="#1f2937"/><rect x="310" y="108" width="585" height="20" rx="10" fill="url(#orange)"><animate attributeName="width" values="0;585;585" dur="2.4s" repeatCount="indefinite"/></rect>
    <text x="0" y="180" class="h">Blockchain Engineer</text>
    <rect x="310" y="162" width="650" height="20" rx="10" fill="#1f2937"/><rect x="310" y="162" width="540" height="20" rx="10" fill="url(#green)"><animate attributeName="width" values="0;540;540" dur="2.6s" repeatCount="indefinite"/></rect>
    <text x="0" y="234" class="h">Backend / Platform Engineer</text>
    <rect x="310" y="216" width="650" height="20" rx="10" fill="#1f2937"/><rect x="310" y="216" width="520" height="20" rx="10" fill="url(#cyan)"><animate attributeName="width" values="0;520;520" dur="2.8s" repeatCount="indefinite"/></rect>
  </g>
  <text x="70" y="390" class="sub">Primary signal: secure engineering, AI-enabled systems, Rust backend infrastructure, and Web3 delivery.</text>

</svg>