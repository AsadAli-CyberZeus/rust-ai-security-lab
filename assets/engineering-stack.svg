<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-label="Engineering capability map">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="45%" stop-color="#071327"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.28"/>
      <stop offset="45%" stop-color="#8b5cf6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .title{font:800 30px Segoe UI,Arial,sans-serif;fill:#f8fafc;letter-spacing:-.4px}
      .h{font:700 18px Segoe UI,Arial,sans-serif;fill:#e5e7eb}
      .sub{font:500 13px Segoe UI,Arial,sans-serif;fill:#94a3b8}
      .small{font:600 12px Segoe UI,Arial,sans-serif;fill:#cbd5e1}
      .tiny{font:600 11px JetBrains Mono,Consolas,monospace;fill:#93c5fd}
      .mono{font:600 15px JetBrains Mono,Consolas,monospace;fill:#e5e7eb}
      .tag{font:700 12px Segoe UI,Arial,sans-serif;fill:#dbeafe;letter-spacing:.5px}
    </style>
  </defs>
  
  <rect width="1100" height="620" rx="28" fill="url(#bg)"/>
  <circle cx="880" cy="120" r="210" fill="url(#orb)"/>
  <path d="M120 120 C340 30 720 45 980 130" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="10 14" opacity=".55">
    <animate attributeName="stroke-dashoffset" from="0" to="-120" dur="8s" repeatCount="indefinite"/>
  </path>
  <text x="55" y="58" class="title">Engineering Capability Map</text>
  <text x="55" y="86" class="sub">Concise stack map based on security, AI, Rust, backend, DevOps, and Web3 work</text>

  <rect x="55" y="122" width="470" height="420" rx="22" fill="#08111f" stroke="#1d4ed8" stroke-opacity=".75"/>
  <text x="82" y="160" class="h">Core Stack</text>
  <text x="82" y="184" class="sub">Primary engineering signal</text>

  <g transform="translate(82,218)">
    <text x="0" y="0" class="small">Rust</text><rect x="0" y="13" width="390" height="12" rx="6" fill="#1f2937"/><rect x="0" y="13" width="365" height="12" rx="6" fill="url(#orange)"><animate attributeName="width" values="0;365;365" dur="2s" repeatCount="indefinite"/></rect><text x="405" y="24" class="tiny">CORE</text>
    <text x="0" y="52" class="small">Python</text><rect x="0" y="65" width="390" height="12" rx="6" fill="#1f2937"/><rect x="0" y="65" width="335" height="12" rx="6" fill="url(#cyan)"><animate attributeName="width" values="0;335;335" dur="2.2s" repeatCount="indefinite"/></rect><text x="405" y="76" class="tiny">STRONG</text>
    <text x="0" y="104" class="small">Solidity</text><rect x="0" y="117" width="390" height="12" rx="6" fill="#1f2937"/><rect x="0" y="117" width="320" height="12" rx="6" fill="url(#purple)"><animate attributeName="width" values="0;320;320" dur="2.4s" repeatCount="indefinite"/></rect><text x="405" y="128" class="tiny">STRONG</text>
    <text x="0" y="156" class="small">C++</text><rect x="0" y="169" width="390" height="12" rx="6" fill="#1f2937"/><rect x="0" y="169" width="290" height="12" rx="6" fill="#60a5fa"><animate attributeName="width" values="0;290;290" dur="2.6s" repeatCount="indefinite"/></rect><text x="405" y="180" class="tiny">WORKING</text>
    <text x="0" y="208" class="small">Dart / Flutter</text><rect x="0" y="221" width="390" height="12" rx="6" fill="#1f2937"/><rect x="0" y="221" width="285" height="12" rx="6" fill="#38bdf8"><animate attributeName="width" values="0;285;285" dur="2.8s" repeatCount="indefinite"/></rect><text x="405" y="232" class="tiny">WORKING</text>
  </g>

  <rect x="570" y="122" width="475" height="420" rx="22" fill="#08111f" stroke="#334155"/>
  <text x="598" y="160" class="h">Applied Domains</text>
  <text x="598" y="184" class="sub">Clean, recruiter-readable capability areas</text>

  <g>
    <rect x="598" y="220" width="190" height="58" rx="14" fill="#0f172a" stroke="#22d3ee"/>
    <text x="616" y="246" class="tag">BACKEND</text><text x="616" y="266" class="tiny">REST · gRPC · APIs</text>
    <rect x="820" y="220" width="190" height="58" rx="14" fill="#0f172a" stroke="#8b5cf6"/>
    <text x="838" y="246" class="tag">AI SYSTEMS</text><text x="838" y="266" class="tiny">LLM eval · prompts</text>
    <rect x="598" y="310" width="190" height="58" rx="14" fill="#0f172a" stroke="#ef4444"/>
    <text x="616" y="336" class="tag">SECURITY</text><text x="616" y="356" class="tiny">VAPT · threat intel</text>
    <rect x="820" y="310" width="190" height="58" rx="14" fill="#0f172a" stroke="#f59e0b"/>
    <text x="838" y="336" class="tag">WEB3</text><text x="838" y="356" class="tiny">EVM · DeFi · dApps</text>
    <rect x="598" y="400" width="190" height="58" rx="14" fill="#0f172a" stroke="#10b981"/>
    <text x="616" y="426" class="tag">DEVOPS</text><text x="616" y="446" class="tiny">Linux · Docker · CI/CD</text>
    <rect x="820" y="400" width="190" height="58" rx="14" fill="#0f172a" stroke="#60a5fa"/>
    <text x="838" y="426" class="tag">WEB / PRODUCT</text><text x="838" y="446" class="tiny">React · Node · UI</text>
  </g>

  <g filter="url(#glow)">
    <circle cx="555" cy="330" r="9" fill="#22d3ee">
      <animate attributeName="r" values="6;12;6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <path d="M525 330 C550 285 565 275 598 250" stroke="#22d3ee" stroke-width="2" fill="none" opacity=".65"/>
    <path d="M525 330 C560 330 575 335 598 340" stroke="#ef4444" stroke-width="2" fill="none" opacity=".65"/>
    <path d="M525 330 C560 380 575 410 598 428" stroke="#10b981" stroke-width="2" fill="none" opacity=".65"/>
  </g>

  <rect x="55" y="565" width="990" height="34" rx="17" fill="#020617" stroke="#1e3a8a"/>
  <circle cx="94" cy="582" r="6" fill="#22d3ee"><animate attributeName="opacity" values="1;.35;1" dur="2s" repeatCount="indefinite"/></circle><text x="113" y="586" class="sub">Build</text>
  <circle cx="194" cy="582" r="6" fill="#8b5cf6"><animate attributeName="opacity" values=".35;1;.35" dur="2s" repeatCount="indefinite"/></circle><text x="213" y="586" class="sub">Automate</text>
  <circle cx="330" cy="582" r="6" fill="#10b981"><animate attributeName="opacity" values="1;.35;1" dur="2.5s" repeatCount="indefinite"/></circle><text x="349" y="586" class="sub">Secure</text>
  <circle cx="450" cy="582" r="6" fill="#f59e0b"><animate attributeName="opacity" values=".35;1;.35" dur="2.5s" repeatCount="indefinite"/></circle><text x="469" y="586" class="sub">Ship</text>

</svg>